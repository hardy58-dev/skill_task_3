<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- <link rel="icon" type="image/svg+xml" href="/vite.svg" /> -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz</title>
  <link rel="stylesheet" href="./css/tailwindcss.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="min-h-svh bg-sand-100 flex flex-col items-center justify-center gap-10">
  <div class="w-full max-w-4xl">
    <div class="flex flex-row justify-between items-center p-4">
      <div class="text-lg text-black font-extrabold">
        Country Flag Quiz Game
      </div>
      <div class="h-1.5 w-16 rounded-2xl bg-black">
      </div>
    </div>
    <div class="bg-gray-50 rounded-2xl">
      <div class="flex flex-col items-center gap-10 p-5 md:p-10 ">
        <div class="flex flex-col items-center gap-2">
          <div class="text-sm text-gray-500" id="progress-text">Questions 1/3</div>
          <div class="text-lg text-gray-800">
            The following flag is <span
              class="px-1 py-0.5 font-bold text-red-500 bg-red-200 border border-red-400 rounded-sm"
              id="question-text">China</span>.
          </div>
        </div>
        <form class="flex flex-col md:flex-row items-stretch gap-5 w-full" id="option-form">
          <div class="flex-1">
            <img src="" alt="flag" class="aspect-3/2 w-full rounded-2xl" id="flag-image">
          </div>
          <div class="flex flex-col justify-between md:w-1/2 gap-5">
            <label class="radio-option">
              <input type="radio" name="options" value="true" class="green-dot" required>
              True
            </label>
            <label class="radio-option">
              <input type="radio" name="options" value="false" class="red-dot">
              False
            </label>
            <button type="submit" class="h-12 md:h-14 rounded-2xl bg-black border-none text-white">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <a href="/" class="text-black font-extrabold">Back to Homepage</a>
  <script type="module" src="./js/script.js"></script>
</body>

</html>
